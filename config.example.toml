# Template for config.toml. Setup (and the app) copy this to config.toml on first
# run; your real settings live there, gitignored. Edit these values, not the code.

account            = "+61XXXXXXXXX"  # your Signal number, linked as a secondary device
base_delay_seconds = 10               # minimum pause between groups (a slow send counts toward it, so big groups get no extra wait); raise to go slower / safer; never below 10s
jitter_seconds     = 3                # random +/- on the pause so sends aren't metronomic (never drops below 10s)
cooldown_hours     = 1                # minimum gap between runs; guards against accidental double-sends
max_retries        = 4                # per-group retry attempts when throttled
send_times         = ["12:00", "16:00"]  # local times the scheduler fires; edit freely
debug              = false                # set true to write raw signal-cli errors to logs/debug-*.txt
wipe_on_close      = false                # set true to ERASE all data every time the app is quit (armed in Security)
concurrent_sends   = 1                    # EXPERIMENTAL: groups to send at once (1 = safe default; >1 may not be faster and raises rate-limit risk; max 5; set in Security)
